<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - EcoCycle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.12;
        }
        .bg-blob-1 {
            width: 400px; height: 400px;
            background: var(--green);
            top: -100px; left: -100px;
        }
        .bg-blob-2 {
            width: 300px; height: 300px;
            background: var(--teal);
            bottom: -80px; right: -80px;
        }
        .bg-blob-3 {
            width: 200px; height: 200px;
            background: var(--blue);
            top: 50%; left: 60%;
            opacity: 0.06;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 520px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.7s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 48px;
        }

        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--green), var(--teal));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 16px var(--green-glow);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .logo-text span { color: var(--green); }

        .icon-wrap {
            width: 88px; height: 88px;
            background: rgba(46,204,113,0.08);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: 0 auto 28px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.15); }
            50%       { box-shadow: 0 0 0 12px rgba(46,204,113,0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            background: rgba(46,204,113,0.08);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--green);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 1.5s ease infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        h1 {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        h1 span { color: var(--green); }

        p.subtitle {
            font-size: 14.5px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .divider {
            width: 48px; height: 3px;
            background: linear-gradient(90deg, var(--green), var(--teal));
            border-radius: 2px;
            margin: 0 auto 40px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--green), var(--teal));
            color: #fff;
            border-radius: 14px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(46,204,113,0.3);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(46,204,113,0.4);
        }

        .back-btn:active { transform: translateY(0); }

        .footer-note {
            margin-top: 48px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>

    <div class="container">
        <a href="dashboard.html" class="logo">
            <div class="logo-icon">♻️</div>
            <div class="logo-text">Eco<span>Cycle</span></div>
        </a>

        <div class="icon-wrap">🚧</div>

        <div class="badge">Under Development</div>

        <h1>Coming <span>Soon</span></h1>

        <div class="divider"></div>

        <p class="subtitle">
            This section is currently being built.<br>
            We're working hard to bring it to you.
        </p>

        <a href="dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Back to Dashboard
        </a>

        <p class="footer-note">EcoCycle &mdash; Building a greener future 🌿</p>
    </div>

</body>
</html>
