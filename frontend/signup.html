<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EcoCollect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            background: #0a1a0f;
            color: #fff;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #0d2818 0%, #1a4a2a 50%, #0a1a0f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.15), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
        }

        .left-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .eco-illustration {
            font-size: 100px;
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .left-content h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .left-content h2 span { color: #2ecc71; }

        .left-content p {
            color: rgba(255,255,255,0.5);
            font-size: 15px;
            max-width: 350px;
            line-height: 1.7;
        }

        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border: 2px solid rgba(46, 204, 113, 0.1);
            border-radius: 50%;
            animation: shapeFloat 10s linear infinite;
        }

        .shape:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-duration: 12s; }
        .shape:nth-child(2) { width: 120px; height: 120px; top: 60%; right: 10%; animation-duration: 15s; animation-delay: -3s; }
        .shape:nth-child(3) { width: 60px; height: 60px; bottom: 15%; left: 20%; animation-duration: 10s; animation-delay: -5s; }
        .shape:nth-child(4) { width: 40px; height: 40px; top: 30%; right: 25%; animation-duration: 8s; animation-delay: -2s; }

        @keyframes shapeFloat {
            0% { transform: rotate(0deg) translateX(20px); }
            100% { transform: rotate(360deg) translateX(20px); }
        }

        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
            overflow-y: auto;
        }

        .form-container {
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.6s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }

        .back-link:hover { color: #2ecc71; }

        .form-container h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            margin-bottom: 35px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }

        .input-wrapper { position: relative; }

        .input-wrapper i:first-of-type {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .input-wrapper:focus-within i:first-of-type { color: #2ecc71; }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder { color: rgba(255,255,255,0.25); }

        .form-group input:focus {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.05);
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        }

        .form-group input.error {
            border-color: #e74c3c;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1);
        }

        .form-group input.success {
            border-color: #2ecc71;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .password-strength .bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 5px;
            color: rgba(255,255,255,0.4);
        }

        .error-text {
            font-size: 11px;
            color: #e74c3c;
            margin-top: 5px;
            display: none;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s ease;
            padding: 0;
        }

        .toggle-password:hover { color: #2ecc71; }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 25px 0;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }

        .terms input[type="checkbox"] {
            appearance: none;
            min-width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin-top: 2px;
        }

        .terms input[type="checkbox"]:checked {
            background: #2ecc71;
            border-color: #2ecc71;
        }

        .terms input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
        }

        .terms a {
            color: #2ecc71;
            text-decoration: none;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::before { left: 100%; }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(46, 204, 113, 0.45);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .divider span {
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-social:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .switch-form {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        .switch-form a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-form a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .left-panel { display: none; }
            .right-panel { padding: 40px 25px; }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <div class="left-content">
            <div class="eco-illustration">🌱</div>
            <h2>Join the <span>Movement</span></h2>
            <p>Create your account and start making a positive impact on our environment. Together, we can build a sustainable future.</p>
        </div>
    </div>

    <div class="right-panel">
        <div class="form-container">
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to home
            </a>

            <h1>Sign Up 🌿</h1>
            <p class="form-subtitle">Create your account to start recycling smarter</p>

            <form method="POST" action="http://127.0.0.1:8000/signup" id="signupForm">
                <div class="form-group">
                    <label for="username">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="username" name="username" required placeholder="you@example.com">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required placeholder="Create a strong password">
                        <i class="fas fa-lock"></i>
                        <button type="button" class="toggle-password" onclick="togglePass('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
                        <i class="fas fa-shield-halved"></i>
                        <button type="button" class="toggle-password" onclick="togglePass('confirmPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-text" id="matchError">Passwords do not match</div>
                </div>

                <label class="terms">
                    <input type="checkbox" id="termsCheck" required>
                    <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                </label>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span>Create Account</span>
                </button>
            </form>

            <div class="divider"><span>or continue with</span></div>

            <div class="social-buttons">
                <button class="btn-social"><i class="fab fa-google"></i></button>
                <button class="btn-social"><i class="fab fa-apple"></i></button>
                <button class="btn-social"><i class="fab fa-github"></i></button>
            </div>

            <p class="switch-form">
                Already have an account? <a href="login.html">Log in</a>
            </p>
        </div>
    </div>

    <script>
        function togglePass(fieldId, btn) {
            const field = document.getElementById(fieldId);
            const icon = btn.querySelector('i');
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const val = this.value;
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const levels = [
                { width: '0%', color: '#555', text: '' },
                { width: '20%', color: '#e74c3c', text: 'Very Weak' },
                { width: '40%', color: '#e67e22', text: 'Weak' },
                { width: '60%', color: '#f1c40f', text: 'Fair' },
                { width: '80%', color: '#2ecc71', text: 'Strong' },
                { width: '100%', color: '#27ae60', text: 'Very Strong 💪' }
            ];

            const level = levels[strength];
            strengthBar.style.width = level.width;
            strengthBar.style.background = level.color;
            strengthText.textContent = level.text;
            strengthText.style.color = level.color;
        });

        // Confirm password match
        const confirmInput = document.getElementById('confirmPassword');
        const matchError = document.getElementById('matchError');

        confirmInput.addEventListener('input', function() {
            if (this.value && this.value !== passwordInput.value) {
                this.classList.add('error');
                this.classList.remove('success');
                matchError.style.display = 'block';
            } else if (this.value) {
                this.classList.remove('error');
                this.classList.add('success');
                matchError.style.display = 'none';
            }
        });

        // Form validation
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            if (passwordInput.value !== confirmInput.value) {
                e.preventDefault();
                confirmInput.classList.add('error');
                matchError.style.display = 'block';
                confirmInput.focus();
                return;
            }
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            btn.style.pointerEvents = 'none';
        });

        // Input animations
        document.querySelectorAll('.form-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
                this.parentElement.style.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
